# One-click deploy of the FastAPI backend on Render
services:
  - type: web
    name: zoom-clone-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_URL
        sync: false # set this to your deployed Vercel URL, e.g. https://your-app.vercel.app
